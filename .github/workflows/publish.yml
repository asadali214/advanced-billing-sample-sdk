name: Publish to NuGet

# Publishes the package when a GitHub Release is published.
# The release tag is used as the package version (a leading "v" is stripped),
# so tagging "v1.0.0" publishes version 1.0.0.
#
# Prerequisite: add a repository secret named NUGET_API_KEY
# (Settings -> Secrets and variables -> Actions -> New repository secret).

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Package version to publish (e.g. 1.0.0)"
        required: true
        default: "1.0.0"

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION="${{ github.event.release.tag_name }}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          VERSION="${VERSION#v}"
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing version $VERSION"

      - name: Restore
        run: dotnet restore MaxioAdvancedBilling.csproj

      - name: Pack
        run: >
          dotnet pack MaxioAdvancedBilling.csproj
          -c Release
          -o ./artifacts
          -p:Version=${{ steps.version.outputs.value }}

      - name: Push to NuGet
        run: >
          dotnet nuget push "./artifacts/*.nupkg"
          --api-key "${{ secrets.NUGET_API_KEY }}"
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
