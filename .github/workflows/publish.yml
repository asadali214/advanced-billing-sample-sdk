name: Publish to NuGet

# Publishes the package to NuGet, then (for manual runs) tags the commit and
# creates a GitHub Release with auto-generated notes once the push succeeds.
#
# Two ways to run:
#   * Manually (workflow_dispatch): provide a version (e.g. 1.0.0). On a
#     successful NuGet push, this creates tag "v<version>" and a GitHub Release
#     with generated notes, attaching the .nupkg as a release asset.
#   * On a published GitHub Release: the release tag is used as the version and
#     the package is published. No new tag/release is created (it already exists).
#
# Prerequisite: add a repository secret named NUGET_API_KEY
# (Settings -> Secrets and variables -> Actions -> New repository secret).

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Package version to publish (e.g. 1.0.0)"
        required: true
        default: "1.0.0"

# Needed so the workflow can create tags and releases.
permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION="${{ github.event.release.tag_name }}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          VERSION="${VERSION#v}"
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing version $VERSION"

      - name: Restore
        run: dotnet restore MaxioAdvancedBilling.csproj

      - name: Pack
        run: >
          dotnet pack MaxioAdvancedBilling.csproj
          -c Release
          -o ./artifacts
          -p:Version=${{ steps.version.outputs.value }}

      - name: Push to NuGet
        run: >
          dotnet nuget push "./artifacts/*.nupkg"
          --api-key "${{ secrets.NUGET_API_KEY }}"
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

      # Runs only for manual runs and only if every previous step succeeded
      # (including the NuGet push). For release-triggered runs the tag/release
      # already exist, so this is skipped to avoid creating a duplicate.
      - name: Tag and create GitHub Release
        if: ${{ success() && github.event_name == 'workflow_dispatch' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v${{ steps.version.outputs.value }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists; skipping."
          else
            gh release create "$TAG" \
              ./artifacts/*.nupkg \
              --title "$TAG" \
              --target "${{ github.sha }}" \
              --generate-notes
          fi
